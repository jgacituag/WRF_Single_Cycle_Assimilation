# WS-2: Full single-observation grid sweep — all methods, all truth members
experiment_tag: WS2_full_sweep
verbose: 1
skip_existing: True

paths:
  prepared: /path/to/state_ensemble.npz
  outdir:   /path/to/output/ws2/

state:
  n_members: 30
  var_idx: {qg: 0, qr: 1, qs: 2, T: 3, P: 4, u: 5, v: 6, w: 7}

obs:
  obs_error_var: 5.0

qc:
  filter_ensemble: true
  filter_truth:    false
  filter_mode:     and
  dbz_min:         5.0

sweep:
  truth_members: all
  obs_points:
    mode: full_grid
  methods: [LETKF, TEnKF, AOEI, ATEnKF, TAOEI]
  ntemp: 3           # fix from WS-1 results
  alpha_s: 2.0
  loc_x: 5.0
  loc_y: 5.0
  loc_z: 5.0
