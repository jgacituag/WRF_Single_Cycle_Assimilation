# WS-1: Ntemp sweep — single observation, all truth members
experiment_tag: WS1_Ntemp_sweep
verbose: 1
skip_existing: True

paths:
  prepared: /path/to/state_ensemble.npz
  outdir:   /path/to/output/ws1/

state:
  n_members: 30
  var_idx: {qg: 0, qr: 1, qs: 2, T: 3, P: 4, u: 5, v: 6, w: 7}

obs:
  obs_error_var: 5.0 

qc:
  filter_ensemble: false
  filter_truth:    false
  filter_mode:     and
  dbz_min:         5.0

sweep:
  truth_members: all
  obs_points:
    mode: single
    loc: {x: 0, y: 0, z: 0}   # update after obs_explorer notebook
  methods: [LETKF, TEnKF]
  ntemp: {start: 1, stop: 10, num: 10}
  alpha_s: 2.0
  loc_x: 5.0
  loc_y: 5.0
  loc_z: 5.0
